name: 'app-catalog'
services:
  app-catalog-preview:
    build:
      context: .
    restart: unless-stopped
    ports:
      - '4002:4002'
    container_name: app-catalog-preview
    volumes:
      - ./db:/var/db/
    environment:
      PORT: 4002

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: app-catalog
      POSTGRES_PASSWORD: app-catalog
      POSTGRES_DB: app-catalog
    ports:
      - '5532:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
